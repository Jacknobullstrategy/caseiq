<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to CaseIQ!</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #0c0c0c; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .box {
      text-align: center; max-width: 460px; padding: 0 24px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    h1 span { color: #c9a84c; }
    p { font-size: 15px; color: #888; font-family: Arial, sans-serif; line-height: 1.65; margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #c9a84c; color: #0c0c0c;
      padding: 14px 36px; border-radius: 8px; text-decoration: none;
      font-family: Arial, sans-serif; font-size: 15px; font-weight: 700;
      transition: background 0.2s;
    }
    .btn:hover { background: #e8c96d; }
    .note { margin-top: 16px; font-size: 12px; color: #444; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>Welcome to <span>CaseIQ</span>!</h1>
    <p>Your subscription is active. You now have full access to the intake screener. Start making smarter case decisions today.</p>
    <a href="/app.html" class="btn">Open CaseIQ →</a>
    <p class="note">Questions? Email us at hello@nobullstrategy.com</p>
  </div>
  <script>
    netlifyIdentity.on('init', user => {
      if (!user) window.location.href = '/';
    });
  </script>
</body>
</html>
